<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Default | Teaching Archives</title>
    <link href="../../styles/typography.css" rel="stylesheet">
    <style>
        :root {
            /* Stealth & Ice Theme */
            --bg: #09090b;
            --bg-alt: #18181b;
            --surface: rgba(24, 24, 27, 0.85);
            --surface-soft: rgba(39, 39, 42, 0.8);
            --surface-hover: rgba(63, 63, 70, 0.85);
            --text: #f4f4f5;
            --muted: #a1a1aa;
            --border: rgba(255, 255, 255, 0.08);
            --primary: #06b6d4; /* Electric Cyan */
            --primary-2: #0891b2; /* Deep Cyan */
            --accent: #22d3ee; /* Bright Ice Blue */
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --gradient-bg: radial-gradient(circle at top left, rgba(6, 182, 212, 0.08), transparent 30%),
                radial-gradient(circle at 80% 20%, rgba(34, 211, 238, 0.05), transparent 25%),
                linear-gradient(180deg, #09090b 0%, #18181b 50%, #000000 100%);
            --hero-glow: radial-gradient(circle at center, rgba(6, 182, 212, 0.12), transparent 60%);
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: var(--gradient-bg);
            background-attachment: fixed;
            color: var(--text);
            padding: 32px;
            line-height: 1.8;
            font-size: 18px;
            min-height: 100vh;
            margin: 0;
        }

        /* 移除了強制首頁無 padding 的設定，確保預覽時能看到內容 */

        .container {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 16px 0;
        }

        h1 {
            color: var(--text);
            margin-bottom: 12px;
            font-size: 3.4em;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1.05;
        }

        h2 {
            color: var(--muted);
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 1.6em;
            font-weight: 500;
        }

        .content {
            background: var(--surface);
            padding: 60px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: var(--shadow);
            position: relative;
            backdrop-filter: blur(14px);
            margin-bottom: 60px;
        }

        p {
            margin: 18px 0;
            font-size: 1.12rem;
            line-height: 1.85;
            color: var(--text);
            opacity: 0.9;
        }

        /* Perfectly Centered Gutter Floating Buttons */
        .floating-side-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            color: var(--text);
            padding: 10px 10px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            text-align: center;
            min-width: 65px;
            text-decoration: none;
        }

        .floating-side-btn:hover {
            border-color: rgba(110, 193, 228, 0.4);
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-50%) scale(1.05);
            color: #fff;
        }

        .floating-left {
            left: max(15px, calc((100vw - 1300px) / 4 - 32px));
        }

        .floating-right {
            right: max(15px, calc((100vw - 1300px) / 4 - 32px));
        }

        /* 加入了一點額外的標記與警告框樣式供預覽 */
        mark.cyan {
            background-color: rgba(110, 193, 228, 0.28);
            color: #fff;
            border: 1px solid rgba(110, 193, 228, 0.45);
            padding: 4px 12px;
            border-radius: 999px;
            font-weight: 700;
        }

        .tips-box {
            padding: 26px;
            margin: 32px 0;
            border-radius: 22px;
            border-left: 4px solid #4c7fa0;
            background: rgba(26, 54, 91, 0.7);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.04);
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>LTF Teaching Archives</h1>
            <h2 style="color: #64748b; font-size: 1.8em; font-weight: 500;">Stealth & Ice Theme Restored</h2>
        </header>

        <div class="content">
            <p>歡迎回來。你的網站已經成功復活，並移除了所有會導致畫面崩潰的錯誤語法。現在這是一個純 HTML 檔案，所有的 CSS 視覺效果都被完美保留了下來。</p>
            
            <div class="tips-box">
                <strong>系統提示：</strong> 你可以使用 <mark class="cyan">Electric Cyan</mark> 來強調重點。
            </div>
            
            <p>如果需要替換內容，只需修改這個 <code>&lt;div class="content"&gt;</code> 裡面的文字即可。</p>
        </div>
    </div>

    <a href="#" class="floating-side-btn floating-left">
        <span style="font-size: 0.85rem; font-weight: 800; line-height: 1; letter-spacing: 0.05em; margin-bottom: 3px; color: var(--accent);">BACK</span>
        <span style="font-size: 0.75rem; line-height: 1; opacity: 0.85;">Home</span>
    </a>

    <button type="button" class="floating-side-btn floating-right" onclick="alert('音訊速度切換功能已觸發！(需配置 JavaScript)')">
        <span style="font-size: 0.85rem; font-weight: 800; line-height: 1; letter-spacing: 0.05em; margin-bottom: 3px; color: var(--accent);">AUDIO</span>
        <span style="font-size: 0.75rem; line-height: 1; opacity: 0.85;">Slower</span>
    </button>

</body>
</html>
