    // Shuffle array function
    function shuffle(array) {
        const newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
    }

    // Generate quiz on page load
    function generateQuiz() {
        const shuffledScenarios = shuffle(scenarioBank).slice(0, 12);

        // Define the 4 logic combinations (3 times each for 12 questions total)
        const logicBank = [];
        for (let i = 0; i < 3; i++) {
            logicBank.push({ testIfClause: true, isIfFirst: true });
            logicBank.push({ testIfClause: false, isIfFirst: true });
            logicBank.push({ testIfClause: true, isIfFirst: false });
            logicBank.push({ testIfClause: false, isIfFirst: false });
        }
        const shuffledLogic = shuffle(logicBank);

        // Generate questions applying the balanced logic
        currentQuestions = shuffledScenarios.map((scenario, index) => {
            const logic = shuffledLogic[index];
            const testIfClause = logic.testIfClause;
            const isIfFirst = logic.isIfFirst;

            let questionText, options, explanation;

            // Define the components
            const ifPartFull = `${scenario.ifSubj} ${scenario.ifVerbCorrect} ${scenario.ifPred}`;
            const ifPartBlank = `${scenario.ifSubj} __________ ${scenario.ifPred}`;

            const mainPartFull = `${scenario.mainSubj} ${scenario.mainVerbCorrect} ${scenario.mainPred}`;
            const mainPartBlank = `${scenario.mainSubj} __________ ${scenario.mainPred}`;

            // Construct the question text based on order and blank location
            if (isIfFirst) {
                // Order: If [clause], [main]
                if (testIfClause) {
                    questionText = `If ${ifPartBlank}, ${mainPartFull}.`;
                    options = [scenario.ifVerbCorrect, scenario.ifVerbWrong1, scenario.ifVerbWrong2];
                    explanation = "In the 'if' clause of the second conditional, use the Past Simple tense.";
                } else {
                    questionText = `If ${ifPartFull}, ${mainPartBlank}.`;
                    options = [scenario.mainVerbCorrect, scenario.mainVerbWrong1, scenario.mainVerbWrong2];
                    explanation = "In the result clause of the second conditional, use 'would' (or other modals like 'could'/'might') + base verb.";
                }
            } else {
                // Order: [main] if [clause] (No comma)
                if (testIfClause) {
                    questionText = `${mainPartFull} if ${ifPartBlank}.`;
                    options = [scenario.ifVerbCorrect, scenario.ifVerbWrong1, scenario.ifVerbWrong2];
                    explanation = "In the 'if' clause of the second conditional, use the Past Simple tense.";
                } else {
                    questionText = `${mainPartBlank} if ${ifPartFull}.`;
                    options = [scenario.mainVerbCorrect, scenario.mainVerbWrong1, scenario.mainVerbWrong2];
                    explanation = "In the result clause of the second conditional, use 'would' (or other modals like 'could'/'might') + base verb.";
                }
            }

            // Capitalize the first letter of the question
            questionText = questionText.charAt(0).toUpperCase() + questionText.slice(1);

            // Shuffle options for this question
            const rawOptions = options.map((opt, idx) => ({ text: opt, isCorrect: idx === 0 }));
            const shuffledOpts = shuffle(rawOptions);
            const finalOptions = shuffledOpts.map(o => o.text);
            const correctIndex = shuffledOpts.findIndex(o => o.isCorrect);

            return {
                question: questionText,
                options: finalOptions,
                correct: correctIndex,
                explanation: explanation
            };
        });

        // Generate HTML for questions
        const quizForm = document.getElementById('quizForm');
        quizForm.innerHTML = '';

        currentQuestions.forEach((q, index) => {
            const questionNum = index + 1;
            const questionId = `q${questionNum}`;

            // Note: Options are already shuffled in the map function above
            answers[questionId] = String.fromCharCode(97 + q.correct); // 'a', 'b', 'c', etc.

            // Build question HTML
            const questionHTML = `
            <div class="question">
                <div class="question-text">${questionNum}. ${q.question} <span class="audio-icon" onclick="speakSentence(this)">🔊</span></div>
                <div class="options">
                    ${q.options.map((opt, idx) => `
                    <label class="option">
                        <input type="radio" name="${questionId}" value="${String.fromCharCode(97 + idx)}">
                        ${opt}
                    </label>`).join('')}
                </div>
                <div class="feedback" id="feedback${questionNum}"></div>
                <div class="explanation" id="explanation${questionNum}">
                    ${q.explanation}
                </div>
                <button type="button" class="check-btn" onclick="checkQuestion(${questionNum})">Check Answer</button>
            </div>`;

            quizForm.innerHTML += questionHTML;
        });
    }

    // Initialize quiz on page load
    window.addEventListener('DOMContentLoaded', generateQuiz);

    function checkQuestion(questionNum) {
        const question = `q${questionNum}`;
        const selected = document.querySelector(`input[name="${question}"]:checked`);

        if (!selected) {
            alert('Please select an answer first.');
            return;
        }

        const isCorrect = (selected.value === answers[question]);
        renderSemanticFeedback(questionNum, isCorrect);

        const button = event.target;
        button.disabled = true;
        button.textContent = 'Checked ✓';

        checkedQuestions.add(questionNum);
        updateProgress();
    }

    function updateProgress() {
        const totalQuestions = Object.keys(answers).length;
        const checked = checkedQuestions.size;
        const progressText = document.getElementById('progressText');

        if (checked === 0) {
            progressText.textContent = 'Answer the questions below';
        } else if (checked === totalQuestions) {
            const correctCount = Array.from(checkedQuestions).filter(num => {
                const question = `q${num}`;
                const selected = document.querySelector(`input[name="${question}"]:checked`);
                return selected && selected.value === answers[question];
            }).length;

            progressText.textContent = `Quiz Complete! Score: ${correctCount}/${totalQuestions}`;
        } else {
            progressText.textContent = `Progress: ${checked}/${totalQuestions} questions checked`;
        }
    }

    function resetQuiz() {
        // Regenerate the quiz with new random questions
        generateQuiz();

        // Reset progress
        checkedQuestions.clear();
        updateProgress();

        // Scroll to top
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
